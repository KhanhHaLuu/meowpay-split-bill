<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeowPay – Split with</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ─── Inline SVG icon helper ─── */
  .icon-svg { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .icon-svg svg { fill: currentColor; }

  /* ─── Reset ─── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  /* ─── Design Tokens (MeowPay — synced with Step 1) ─── */
  :root {
    --mp-primary: #F0960F;
    --mp-primary-light: #FFEFD6;
    --mp-primary-dim: rgba(240, 150, 15, 0.35);
    --mp-secondary: #5563C1;
    --mp-secondary-container: #E0E2FF;
    --mp-surface: #FDFBF8;
    --mp-surface-dim: #F5F2EE;
    --mp-surface-container: #EFECE8;
    --mp-on-surface: #1C1B18;
    --mp-on-surface-variant: #4A4740;
    --mp-outline: #7C7870;
    --mp-outline-variant: #CCC7BF;
    --mp-disabled: #C8C5BE;
    --mp-disabled-text: #9E9A93;
    --mp-error: #DC362E;
    --mp-shape-full: 9999px;
    --mp-shape-lg: 20px;
    --mp-shape-md: 14px;
    --mp-shape-sm: 10px;
    --font-display: 'Google Sans', 'Noto Sans', system-ui, sans-serif;
    --font-body: 'Noto Sans', 'Google Sans', system-ui, sans-serif;
    --ease-emphasized: cubic-bezier(0.2, 0, 0, 1);
    --ease-standard: cubic-bezier(0.2, 0.0, 0, 1.0);
  }

  body {
    font-family: var(--font-body);
    background: #F0EDE9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }

  /* ─── Phone Frame ─── */
  .phone-frame {
    width: 393px;
    height: 852px;
    background: var(--mp-surface);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.06),
      0 25px 60px -12px rgba(0,0,0,0.18),
      0 8px 24px -8px rgba(0,0,0,0.10),
      inset 0 0 0 1.5px rgba(255,255,255,0.5);
    display: flex;
    flex-direction: column;
  }

  /* ─── Status Bar ─── */
  .status-bar {
    height: 54px;
    padding: 14px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .status-time {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.01em;
    color: var(--mp-on-surface);
  }
  .status-icons { display: flex; align-items: center; gap: 5px; }
  .status-icons svg { height: 12px; fill: var(--mp-on-surface); }

  /* ─── Navigation Bar ─── */
  .nav-bar {
    height: 56px;
    padding: 0 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
  }
  .nav-back {
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: none; background: transparent;
    cursor: pointer; transition: background 0.2s var(--ease-standard);
  }
  .nav-back:hover { background: rgba(0,0,0,0.05); }
  .nav-title {
    font-family: var(--font-display);
    font-weight: 600; font-size: 18px;
    letter-spacing: -0.01em; color: var(--mp-on-surface);
    position: absolute; left: 50%; transform: translateX(-50%);
  }
  .nav-spacer { width: 48px; }

  /* ─── Step Indicator ─── */
  .step-indicator {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 8px 0 0; flex-shrink: 0;
  }
  .step-dot {
    width: 28px; height: 4px; border-radius: 2px;
    background: var(--mp-outline-variant);
    transition: all 0.4s var(--ease-emphasized);
  }
  .step-dot.active { background: var(--mp-primary); }
  .step-dot.done { background: var(--mp-primary-dim); }

  /* ─── Search Bar ─── */
  .search-bar {
    margin: 20px 24px 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    height: 48px;
    background: var(--mp-surface-dim);
    border-radius: var(--mp-shape-full);
    border: 1.5px solid transparent;
    transition: all 0.25s var(--ease-standard);
    flex-shrink: 0;
  }
  .search-bar:focus-within {
    border-color: var(--mp-primary);
    background: var(--mp-surface);
    box-shadow: 0 0 0 3px rgba(240,150,15,0.10);
  }
  .search-bar .icon-svg { color: var(--mp-outline); }
  .search-bar input {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: var(--font-body); font-size: 15px;
    color: var(--mp-on-surface); caret-color: var(--mp-primary);
  }
  .search-bar input::placeholder { color: var(--mp-disabled-text); }

  /* ─── Selected Chips Bar ─── */
  .selected-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px 0;
    flex-wrap: wrap;
    min-height: 0;
    flex-shrink: 0;
    transition: min-height 0.3s var(--ease-emphasized);
  }
  .selected-bar:empty { padding: 0; }
  .selected-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 6px 6px 12px;
    background: var(--mp-primary-light);
    border: 1.5px solid var(--mp-primary);
    border-radius: var(--mp-shape-full);
    font-family: var(--font-display);
    font-size: 13px; font-weight: 600;
    color: var(--mp-on-surface);
    animation: chipIn 0.3s var(--ease-emphasized) both;
    cursor: default;
  }
  .selected-chip .chip-remove {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: none;
    background: rgba(240,150,15,0.2);
    cursor: pointer; transition: background 0.15s ease;
    padding: 0;
  }
  .selected-chip .chip-remove:hover { background: rgba(240,150,15,0.35); }

  /* ─── Content Scrollable ─── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px 0;
  }
  .content::-webkit-scrollbar { width: 0; }

  /* ─── Section ─── */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mp-outline);
    padding: 16px 0 10px;
  }
  .section-label:first-child { padding-top: 4px; }

  /* ─── List Item ─── */
  .list-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 4px;
    border-radius: var(--mp-shape-sm);
    cursor: pointer;
    transition: background 0.15s ease;
    user-select: none;
    -webkit-user-select: none;
  }
  .list-item:hover { background: rgba(0,0,0,0.03); }
  .list-item:active { background: rgba(0,0,0,0.06); }

  /* Avatar */
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 600; font-size: 16px;
    color: #fff; flex-shrink: 0;
    position: relative;
  }
  .avatar.group {
    border-radius: var(--mp-shape-sm);
  }
  .avatar img {
    width: 100%; height: 100%;
    border-radius: inherit; object-fit: cover;
  }

  .list-item-info {
    flex: 1; min-width: 0;
  }
  .list-item-name {
    font-family: var(--font-display);
    font-size: 15px; font-weight: 500;
    color: var(--mp-on-surface);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .list-item-sub {
    font-size: 12.5px; color: var(--mp-outline);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 1px;
  }

  /* Checkbox */
  .check-circle {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--mp-outline-variant);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s var(--ease-emphasized);
  }
  .list-item.selected .check-circle {
    border-color: var(--mp-primary);
    background: var(--mp-primary);
  }
  .check-circle .check-icon {
    opacity: 0; transform: scale(0.5);
    transition: all 0.25s var(--ease-emphasized);
  }
  .list-item.selected .check-circle .check-icon {
    opacity: 1; transform: scale(1);
  }

  /* ─── Add Guest Row ─── */
  .add-guest-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 4px;
    border-radius: var(--mp-shape-sm);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .add-guest-row:hover { background: rgba(0,0,0,0.03); }
  .add-guest-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px dashed var(--mp-outline-variant);
    display: flex; align-items: center; justify-content: center;
    color: var(--mp-outline);
    transition: all 0.2s var(--ease-standard);
  }
  .add-guest-row:hover .add-guest-icon {
    border-color: var(--mp-primary);
    color: var(--mp-primary);
  }
  .add-guest-label {
    font-family: var(--font-display);
    font-size: 15px; font-weight: 500;
    color: var(--mp-outline);
  }
  .add-guest-row:hover .add-guest-label { color: var(--mp-primary); }

  /* ─── Bottom Section ─── */
  .bottom-section {
    flex-shrink: 0;
    padding: 16px 24px 0;
    display: flex;
    flex-direction: column;
  }

  /* ─── CTA Button ─── */
  .cta-btn {
    width: 100%;
    height: 56px;
    border: none;
    border-radius: var(--mp-shape-md);
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.35s var(--ease-emphasized);
    position: relative;
    overflow: hidden;
  }
  .cta-btn.disabled {
    background: var(--mp-surface-container);
    color: var(--mp-disabled-text);
    pointer-events: none;
  }
  .cta-btn.enabled {
    background: var(--mp-primary);
    color: #fff;
    box-shadow: 0 2px 12px rgba(240, 150, 15, 0.30);
  }
  .cta-btn.enabled:hover {
    box-shadow: 0 4px 20px rgba(240, 150, 15, 0.40);
    transform: translateY(-1px);
  }
  .cta-btn.enabled:active {
    transform: scale(0.985);
    box-shadow: 0 1px 8px rgba(240, 150, 15, 0.25);
  }
  .cta-count {
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.25);
    border-radius: var(--mp-shape-full);
    padding: 2px 10px;
    font-size: 13px; font-weight: 700;
    margin-left: 4px;
    min-width: 24px;
  }

  /* ─── Home Indicator ─── */
  .home-indicator {
    height: 34px;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 10px; flex-shrink: 0;
  }
  .home-indicator-bar {
    width: 134px; height: 5px;
    background: var(--mp-on-surface); border-radius: 3px; opacity: 0.18;
  }

  /* ─── Animations ─── */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes chipIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  .anim-slide-up { animation: slideUp 0.5s var(--ease-emphasized) both; }
  .anim-fade { animation: fadeIn 0.4s var(--ease-standard) both; }
  .delay-1 { animation-delay: 0.08s; }
  .delay-2 { animation-delay: 0.16s; }
  .delay-3 { animation-delay: 0.24s; }
  .delay-4 { animation-delay: 0.36s; }
</style>
</head>

        <span class="check-icon icon-svg" style="width:14px;height:14px;color:#fff;"><svg xmlns="http://www.w3.org/2000/svg" height="14" viewBox="0 -960 960 960" width="14"><path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/></svg></span>
      </div>
    </div>

    <div class="list-item" data-id="friend-4" data-name="Linh Chi" onclick="toggleSelect(this)">
      <div class="avatar" style="background:#8E24AA;">LC</div>
      <div class="list-item-info">
        <div class="list-item-name">Linh Chi</div>
        <div class="list-item-sub">@linhchi.mp</div>
      </div>
      <div class="check-circle">
        <span class="check-icon icon-svg" style="width:14px;height:14px;color:#fff;"><svg xmlns="http://www.w3.org/2000/svg" height="14" viewBox="0 -960 960 960" width="14"><path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/></svg></span>
      </div>
    </div>

    <!-- Add Guest -->
    <div class="section-label" style="padding-top:20px;">Thêm mới</div>

    <div class="add-guest-row" onclick="alert('Thêm khách vãng lai')">
      <div class="add-guest-icon">
        <span class="icon-svg" style="width:22px;height:22px;"><svg xmlns="http://www.w3.org/2000/svg" height="22" viewBox="0 -960 960 960" width="22"><path d="M720-400v-120H600v-80h120v-120h80v120h120v80H800v120h-80Zm-360-80q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM40-160v-112q0-34 17.5-62.5T104-378q62-31 126-46.5T360-440q66 0 130 15.5T616-378q29 15 46.5 43.5T680-272v112H40Z"/></svg></span>
      </div>
      <div class="add-guest-label">Thêm khách (add guest)</div>
    </div>

    <!-- Bottom spacer -->
    <div style="height: 8px;"></div>
  </div>

  <!-- Bottom CTA -->
  <div class="bottom-section">
    <button class="cta-btn disabled" id="ctaBtn">
      <span id="ctaText">Tiếp theo</span>
      <span class="icon-svg" style="width:20px;height:20px;"><svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor"><path d="M647-440H160v-80h487L423-744l57-56 320 320-320 320-57-56 224-224Z"/></svg></span>
    </button>
  </div>

  <div class="home-indicator">
    <div class="home-indicator-bar"></div>
  </div>

</div>

<script>
  // ─── State ───
  const selected = new Map(); // id → { name, element }
  const ctaBtn   = document.getElementById('ctaBtn');
  const ctaText  = document.getElementById('ctaText');
  const selBar   = document.getElementById('selectedBar');
  const searchIn = document.getElementById('searchInput');

  function toggleSelect(el) {
    const id   = el.dataset.id;
    const name = el.dataset.name;

    if (selected.has(id)) {
      selected.delete(id);
      el.classList.remove('selected');
    } else {
      selected.set(id, { name, element: el });
      el.classList.add('selected');
    }
    renderChips();
    updateCTA();
  }

  function removeSelection(id) {
    const entry = selected.get(id);
    if (entry) {
      entry.element.classList.remove('selected');
      selected.delete(id);
    }
    renderChips();
    updateCTA();
  }

  function renderChips() {
    selBar.innerHTML = '';
    selected.forEach((val, id) => {
      const chip = document.createElement('div');
      chip.className = 'selected-chip';
      chip.innerHTML = `
        ${val.name}
        <button class="chip-remove" onclick="event.stopPropagation();removeSelection('${id}')">
          <span class="icon-svg" style="width:12px;height:12px;color:var(--mp-primary);">
            <svg xmlns="http://www.w3.org/2000/svg" height="12" viewBox="0 -960 960 960" width="12"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
          </span>
        </button>
      `;
      selBar.appendChild(chip);
    });
  }

  function updateCTA() {
    const count = selected.size;
    if (count > 0) {
      ctaBtn.classList.remove('disabled');
      ctaBtn.classList.add('enabled');
      ctaText.innerHTML = `Tiếp theo <span class="cta-count">${count}</span>`;
    } else {
      ctaBtn.classList.remove('enabled');
      ctaBtn.classList.add('disabled');
      ctaText.textContent = 'Tiếp theo';
    }
  }

  // ─── Search filter ───
  searchIn.addEventListener('input', () => {
    const q = searchIn.value.toLowerCase().trim();
    document.querySelectorAll('.list-item').forEach(item => {
      const name = item.dataset.name.toLowerCase();
      item.style.display = (!q || name.includes(q)) ? '' : 'none';
    });
  });
</script>

</body>
</html>
